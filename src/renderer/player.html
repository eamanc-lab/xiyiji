<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
        user-select: none;
      }
      #videoContainer {
        -webkit-app-region: drag;
      }
      video {
        -webkit-app-region: drag;
      }
      canvas {
        -webkit-app-region: drag;
      }
      .close-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: none;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s;
        -webkit-app-region: no-drag;
      }
      .close-btn:hover {
        background: rgba(213, 73, 65, 0.9);
      }
      body:hover .close-btn {
        opacity: 1;
      }
      .status-text {
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.6);
        font-size: 12px;
        font-family: system-ui, sans-serif;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }
      body:hover .status-text {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="videoContainer" style="position: relative; width: 100%; height: 100%;">
      <video id="videoPlayerA" muted style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2;"></video>
      <video id="videoPlayerB" muted style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none;"></video>
      <video id="cameraVideo" autoplay muted playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; display: none;"></video>
      <canvas id="frameStreamCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: none;"></canvas>
      <canvas id="chromaCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 3; display: none;"></canvas>
    </div>
    <button class="close-btn" id="closeBtn">&times;</button>
    <div class="status-text" id="statusText"></div>
    <script type="module" src="./src/player.ts"></script>
  </body>
</html>
